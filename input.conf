# Defaults: https://github.com/mpv-player/mpv/blob/master/etc/input.conf

# Seek by exactly 3s instead of relative+keyframes 3s
RIGHT no-osd seek 3 exact
LEFT no-osd seek -3 exact

# Seek by exactly 30s instead of relative+keyframes 30s
UP no-osd seek 30 exact
DOWN no-osd seek -30 exact

# Change volume by mouse wheels
WHEEL_UP add volume 5
WHEEL_DOWN add volume -5

# Zoom in/out at cursor
#Ctrl+wheel_up add video-zoom 0.1
#Ctrl+wheel_down add video-zoom -0.1

# Reset video scale
z set video-scale-x  1.00; set video-scale-y 1; set video-zoom 0 

# Take a screenshot of the video in its original resolution with subtitles
#s screenshot
# Take a screenshot of the video in its original resolution without subtitles                          
#S screenshot video                  

# Skip to the next file
PGUP playlist-next                  	
KP_PGUP playlist-next

# Skip to the previous file
PGDWN playlist-prev			
KP_PGDWN playlist-prev


CTRL+1 no-osd change-list glsl-shaders set "~~/shaders/adaptive-sharpen.glsl"; show-text "AdaptiveSharpen"
CTRL+0 no-osd change-list glsl-shaders clr ""; show-text "GLSL shaders cleared"
